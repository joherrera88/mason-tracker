const HASH="2495704cda2eeadad5a9e494116f2257f2f33144ad2eeecf50bd0429824fdce0";
async function sha256(msg){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function checkPwd(){
  const val=document.getElementById("pwd-input").value;
  const h=await sha256(val);
  if(h===HASH){
    sessionStorage.setItem("mwm_auth","1");
    document.getElementById("login-screen").style.display="none";
    document.getElementById("root").style.display="block";
  } else {
    document.getElementById("pwd-error").style.display="block";
    document.getElementById("pwd-input").value="";
    document.getElementById("pwd-input").focus();
  }
}
// Check if already authenticated this session
window.addEventListener("DOMContentLoaded",()=>{
  if(sessionStorage.getItem("mwm_auth")==="1"){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("root").style.display="block";
  } else {
    document.getElementById("pwd-input").focus();
  }
});
</script>

// ── BIS EMAIL PARSER ──────────────────────────────────────────────────────────
function parseBISEmail(text){
  const lines=text.split("\n").map(l=>l.trim());
  const records=[];
  let uid=Date.now();
  let i=0;

  function isPolicyLine(line){
    const parts=line.split(" - ");
    return parts.length>=3&&parts.some(p=>/\d{6,}/.test(p));
  }

  function isChangeLine(line){
    const l=line.toLowerCase();
    return l.includes("from")&&l.includes("to")||l.includes("reduced")||l.includes("increased")||l.includes("changed")||l.includes("amended")||l.includes("status")||l.includes("inception")||l.includes("premium")||l.includes("lapsed")||l.includes("surrender");
  }

  function classifyStatus(content){
    const c=content.toLowerCase();
    const livePatterns=["status changed from in force to lapsed","out of force","lapsed","surrender","proposal to prem paying","proposal to single premium","pending to active","not yet in force","status changed from proposal","status changed from in force to not","to out of force"];
    for(const p of livePatterns){if(c.includes(p))return["Live","?"];}
    const completePatterns=["reduced from","increased from","premium changed","premium change","policy inception date","inception date amended","inception date changed","payment method"];
    for(const p of completePatterns){if(c.includes(p))return["Complete","None"];}
    return["Live","?"];
  }

  function nextNonEmpty(from){
    for(let k=from;k<lines.length;k++){if(lines[k])return lines[k];}
    return"";
  }

  while(i<lines.length){
    const line=lines[i];
    if(!line){i++;continue;}
    if(/^(hi |the following|bis platform|noreply|data changes|recorded in|follow up|completed on)/i.test(line)){i++;continue;}

    // Check if the next non-empty line is a policy line -> this line is a client name
    let j=i+1;
    while(j<lines.length&&!lines[j])j++;
    const nxt=lines[j]||"";

    if(nxt&&isPolicyLine(nxt)){
      const clientName=line;
      i=j; // move to policy line

      const policyLine=lines[i]||"";
      const parts=policyLine.split(" - ").map(p=>p.trim());
      const company=parts[0]||"";
      const policy=parts[1]||"";
      const policyType=parts.slice(2).join(" - ")||"";
      i++;

      // Collect change lines until next client name
      const changeLines=[];
      while(i<lines.length){
        const cl=lines[i].trim();
        if(!cl){i++;continue;}
        // Peek ahead to see if next non-empty is a policy line (meaning cl is a client name)
        const nxtNE=nextNonEmpty(i+1);
        if(isPolicyLine(nxtNE)&&!isChangeLine(cl)){break;}
        changeLines.push(cl);
        i++;
      }

      const content=policyType+(changeLines.length?("\n"+changeLines.join("\n")):"");
      const[status,action]=classifyStatus(content);
      const incomplete=clientName.trim().split(/\s+/).length===1;

      records.push({id:uid++,date:tday(),source:"BIS",company,client:clientName,policy,adviser:"",content:content.trim(),action,status,incomplete});
    } else {
      i++;
    }
  }
  return records;
}

function parseXLSX(buf){
  const wb=XLSX.read(buf,{type:"array",cellDates:false});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});
  let hRow=-1;
  for(let i=0;i<rows.length;i++){if(rows[i]&&rows[i].some(v=>v&&String(v).toLowerCase().trim()==="status")){hRow=i;break;}}
  if(hRow<0)return[];
  const headers=rows[hRow].map(v=>v?String(v).toLowerCase().trim():"");
  const dI=headers.findIndex(h=>h.includes("receiv")||h==="date");
  const srcI=headers.findIndex(h=>h==="source");
  const coI=headers.findIndex(h=>h==="company");
  const clI=headers.findIndex(h=>h==="client");
  const polI=headers.findIndex(h=>h.includes("number")||h==="policy");
  const advI=headers.findIndex(h=>h==="adviser");
  const contI=headers.findIndex(h=>h==="content");
  const actI=headers.findIndex(h=>h==="action");
  const stI=headers.findIndex(h=>h==="status");
  const out=[];let uid=Date.now();
  function toYMD(val){
    if(!val&&val!==0)return"";
    if(typeof val==="string"){
      const m1=val.match(/^(\d{2})\/(\d{2})\/(\d{4})/);if(m1)return m1[3]+"-"+m1[2]+"-"+m1[1];
      const m2=val.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m2)return m2[0];
      return"";
    }
    if(typeof val==="number"){const epoch=new Date(1899,11,30).getTime();const d=new Date(epoch+val*86400000);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
    return"";
  }
  for(let i=hRow+1;i<rows.length;i++){
    const r=rows[i];if(!r||!r[clI])continue;
    const cs=String(r[clI]).trim();
    if(["Client","N/A","None","Received","Date",""].includes(cs))continue;
    let s=String(r[stI]||"").trim();
    s=(!s||s.toLowerCase().includes("complete"))?"Complete":s.toLowerCase().includes("live")?"Live":"Complete";
    const ds=toYMD(r[dI]);if(!ds)continue;
    const a=r[advI]&&!["?","None","null",""].includes(String(r[advI]).trim())?String(r[advI]).trim():"";
    const ac=r[actI]&&!["None","?","null",""].includes(String(r[actI]).trim())?String(r[actI]).trim():"";
    out.push({id:uid++,date:ds,source:String(r[srcI]||"").trim(),company:String(r[coI]||"").trim(),client:cs,policy:String(r[polI]||"").trim(),adviser:a,content:String(r[contI]||"").trim(),action:ac,status:s});
  }
  return out;
}

async function exportToExcel(data){
  if(!window.ExcelJS){
    await new Promise((resolve,reject)=>{const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js";s.onload=resolve;s.onerror=reject;document.head.appendChild(s);});
  }
  const ExcelJS=window.ExcelJS;
  const wb=new ExcelJS.Workbook();
  const ws=wb.addWorksheet("Correspondence Log");
  ws.columns=[{width:5},{width:13},{width:9},{width:14},{width:22},{width:14},{width:9},{width:56},{width:30},{width:13}];
  const tb={style:"thin",color:{argb:"FFAAAAAA"}};const ab={top:tb,left:tb,bottom:tb,right:tb};
  ws.addRow([]).height=5;
  const r2=ws.addRow([null,"Mason Wealth Management — Correspondence Tracker",null,null,null,null,null,null,null,null]);
  r2.height=30;for(let c=2;c<=10;c++){r2.getCell(c).fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF1F4E79"}};}
  r2.getCell(2).font={bold:true,size:14,color:{argb:"FFFFFFFF"}};r2.getCell(2).alignment={horizontal:"left",vertical:"middle"};
  ws.addRow([]).height=5;
  const r4=ws.addRow([null,"Date",null,null,null,"Policy",null,null,null,null]);r4.height=13.95;
  for(let c=2;c<=10;c++){r4.getCell(c).fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF2E75B6"}};r4.getCell(c).font={bold:true,size:9,color:{argb:"FFFFFFFF"}};r4.getCell(c).alignment={horizontal:"center",vertical:"middle"};}
  const r5=ws.addRow([null,"Received","Source","Company","Client","Number","Adviser","Content","Action","Status"]);r5.height=19.95;
  for(let c=2;c<=10;c++){r5.getCell(c).fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFBDD7EE"}};r5.getCell(c).font={bold:true,size:10,color:{argb:"FF1F2D3D"}};r5.getCell(c).alignment={horizontal:"center",vertical:"middle",wrapText:true};r5.getCell(c).border=ab;}
  data.forEach((r,i)=>{
    const isLive=r.status==="Live";const bg=i%2===0?"FFF2F9FF":"FFFFFFFF";
    let ds="";if(r.date&&r.date.length>=10){const[y,m,d]=r.date.split("-");if(y&&m&&d)ds=d+"/"+m+"/"+y;}
    const adv=(r.adviser&&r.adviser!=="?"&&r.adviser!=="None")?r.adviser:"";
    const act=(r.action&&r.action!=="?"&&r.action!=="None"&&r.action.trim()!=="")?r.action:(isLive?"?":"None");
    const rh=Math.max(40.05,(r.content||"").split("\n").length*14+8);
    const row=ws.addRow([null,ds,r.source||"",r.company||"",r.client||"",r.policy||"",adv,r.content||"",act,r.status||""]);
    row.height=rh;
    for(let c=2;c<=7;c++){row.getCell(c).fill={type:"pattern",pattern:"solid",fgColor:{argb:bg}};row.getCell(c).font={size:9};row.getCell(c).alignment={horizontal:"center",vertical:"middle"};row.getCell(c).border=ab;}
    row.getCell(8).fill={type:"pattern",pattern:"solid",fgColor:{argb:bg}};row.getCell(8).font={size:9};row.getCell(8).alignment={horizontal:"left",vertical:"top",wrapText:true};row.getCell(8).border=ab;
    row.getCell(9).fill={type:"pattern",pattern:"solid",fgColor:{argb:isLive?"FFFF0000":bg}};row.getCell(9).font={size:9};row.getCell(9).alignment={horizontal:"center",vertical:"middle"};row.getCell(9).border=ab;
    row.getCell(10).fill={type:"pattern",pattern:"solid",fgColor:{argb:isLive?"FFFF0000":"FFE2EFDA"}};row.getCell(10).font={bold:true,size:9};row.getCell(10).alignment={horizontal:"center",vertical:"middle"};row.getCell(10).border=ab;
  });
  ws.views=[{state:"frozen",xSplit:1,ySplit:5,topLeftCell:"B6",activeCell:"B6"}];
  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  const dt=new Date();
  a.href=url;a.download="Correspondence_Tracker_"+dt.getFullYear()+String(dt.getMonth()+1).padStart(2,"0")+String(dt.getDate()).padStart(2,"0")+".xlsx";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

  const[fAdv,setFAdv]=useState("All");
  const[fSrc,setFSrc]=useState("All");
  const[fStat,setFStat]=useState("All");
  const[fDate,setFDate]=useState("All");
  const[tab,setTab]=useState("live");
  const[sel,setSel]=useState(null);
  const[eAct,setEAct]=useState("");
  const[eStat,setEStat]=useState("");
  const[eNote,setENote]=useState("");
  const[eAdv,setEAdv]=useState("");
  const[inEd,setInEd]=useState(null);
  const[inVal,setInVal]=useState("");
  const[toast,setToast]=useState(null);
  const[showImp,setShowImp]=useState(false);
  const[importing,setImporting]=useState(false);
  const[impPrev,setImpPrev]=useState(null);
  const[drag,setDrag]=useState(false);
  // BIS paste state
  const[showBIS,setShowBIS]=useState(false);
  const[bisText,setBisText]=useState("");
  const[bisPrev,setBisPrev]=useState(null);
  const[bisEditing,setBisEditing]=useState(null);
  // Post entry state
  const[showPost,setShowPost]=useState(false);
  const[postForm,setPostForm]=useState({client:"",company:"",policy:"",adviser:"",content:"",action:"",status:"Complete"});
  const fRef=useRef();
  const saveTimer=useRef(null);
  const ADVISERS=["Declan","Ian","Justin","Les","Mark","Micheal","Paul","Peter","Phil","Roisin"];

  useEffect(()=>{
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));setLastSaved(new Date());}catch(e){}},1000);
    return()=>{if(saveTimer.current)clearTimeout(saveTimer.current);};
  },[data]);

  const showT=(msg,c="#16a34a")=>{setToast({msg,c});setTimeout(()=>setToast(null),3000);};
  const cos=useMemo(()=>["All",...Array.from(new Set(data.map(r=>r.company))).filter(Boolean).sort()],[data]);
  const advs=useMemo(()=>["All",...Array.from(new Set(data.map(r=>r.adviser))).filter(Boolean).sort()],[data]);
  const dates=useMemo(()=>["All",...Array.from(new Set(data.map(r=>r.date))).filter(Boolean).sort().reverse()],[data]);
  const live=useMemo(()=>data.filter(r=>r.status==="Live"),[data]);
  const reinstate=useMemo(()=>live.filter(r=>r.action.toLowerCase().includes("reinstate")||r.action.toLowerCase().includes("17th")||r.action.toLowerCase().includes("lapsed")||r.action.toLowerCase().includes("out of force")),[live]);
  const todayR=useMemo(()=>data.filter(r=>r.date===tday()),[data]);
  const todayL=useMemo(()=>todayR.filter(r=>r.status==="Live"),[todayR]);
  const advWL=useMemo(()=>{const m={};live.forEach(r=>{const a=r.adviser||"Unassigned";if(!m[a])m[a]=0;m[a]++;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);},[live]);
  const filtered=useMemo(()=>{
    let d=tab==="live"?live:tab==="reinstate"?reinstate:tab==="today"?todayR:data;
    if(search){const s=search.toLowerCase();d=d.filter(r=>r.client.toLowerCase().includes(s)||r.policy.toLowerCase().includes(s)||r.company.toLowerCase().includes(s)||r.adviser.toLowerCase().includes(s));}
    if(fCo!=="All")d=d.filter(r=>r.company===fCo);
    if(fAdv!=="All")d=d.filter(r=>r.adviser===fAdv);
    if(fSrc!=="All")d=d.filter(r=>r.source===fSrc);
    if(fStat!=="All")d=d.filter(r=>r.status===fStat);
    if(fDate!=="All")d=d.filter(r=>r.date===fDate);
    return d;
  },[data,search,fCo,fAdv,fSrc,fStat,fDate,tab,live,reinstate,todayR]);
  const byCo=useMemo(()=>{const c={};data.forEach(r=>{if(!c[r.company])c[r.company]={t:0,l:0};c[r.company].t++;if(r.status==="Live")c[r.company].l++;});return Object.entries(c).sort((a,b)=>b[1].t-a[1].t);},[data]);

  const handleFile=async(file)=>{
    if(!file)return;
    if(!file.name.match(/\.xlsx?$/i)){showT("Please upload an .xlsx file","#dc2626");return;}
    setImporting(true);
    try{
      const buf=await file.arrayBuffer();const parsed=parseXLSX(buf);
      if(!parsed.length){showT("No records found","#dc2626");setImporting(false);return;}
      const ex=new Set(data.map(r=>r.policy+"|"+r.date));
      setImpPrev({all:parsed,newOnly:parsed.filter(r=>!ex.has(r.policy+"|"+r.date))});
    }catch(e){showT("Error: "+e.message,"#dc2626");}
    setImporting(false);
  };
  const confirmImp=(mode)=>{
    if(!impPrev)return;
    if(mode==="replace"){setData(impPrev.all);showT("Loaded "+impPrev.all.length+" records");}
    else{setData([...data,...impPrev.newOnly]);showT("Added "+impPrev.newOnly.length+" new records");}
    setImpPrev(null);setShowImp(false);
  };

  // BIS handlers
  const parseBIS=()=>{
    if(!bisText.trim()){showT("Please paste the BIS email text","#dc2626");return;}
    const parsed=parseBISEmail(bisText);
    if(!parsed.length){showT("No records found - check the format","#dc2626");return;}
    setBisPrev(parsed);
  };
  const updateBisRec=(id,field,val)=>{setBisPrev(prev=>prev.map(r=>r.id===id?{...r,[field]:val}:r));};
  const confirmBIS=()=>{
    if(!bisPrev)return;
    const clean=bisPrev.map(({incomplete,...r})=>r);
    setData(prev=>[...prev,...clean]);
    showT("Added "+clean.length+" BIS records");
    setBisPrev(null);setBisText("");setShowBIS(false);
  };

  // Post handlers
  const submitPost=()=>{
    if(!postForm.client||!postForm.company){showT("Client and Company are required","#dc2626");return;}
    const newRec={...postForm,id:Date.now(),date:tday(),source:"Post"};
    setData(prev=>[newRec,...prev]);
    setPostForm({client:"",company:"",policy:"",adviser:"",content:"",action:"",status:"Complete"});
    setShowPost(false);
    showT("Post record added");
  };

  const openRec=rec=>{setSel(rec);setEAct(rec.action);setEStat(rec.status);setENote(rec.notes||"");setEAdv(rec.adviser||"");};
  const saveRec=()=>{setData(prev=>prev.map(r=>r.id===sel.id?{...r,action:eAct,status:eStat,notes:eNote,adviser:eAdv}:r));setSel(null);showT("Record saved");};
  const markDone=id=>{setData(prev=>prev.map(r=>r.id===id?{...r,status:"Complete",action:(r.action||"")+" Actioned "+fmt(tday())}:r));showT("Marked as actioned");};
  const startIn=(rec,field,e)=>{e.stopPropagation();setInEd({id:rec.id,field});setInVal(rec[field]||"");};
  const saveIn=()=>{if(!inEd)return;setData(prev=>prev.map(r=>r.id===inEd.id?{...r,[inEd.field]:inVal}:r));setInEd(null);};
  const clear=()=>{setSearch("");setFCo("All");setFAdv("All");setFSrc("All");setFStat("All");setFDate("All");};
  const handleExport=async()=>{try{await exportToExcel(data);showT("Exported successfully");}catch(e){showT("Export failed: "+e.message,"#dc2626");}};
  const endOfDay=async()=>{
    if(!confirm("End of Day: This will download your Excel file and then clear all data from the dashboard. Are you sure?")){return;}
    try{
      await exportToExcel(data);
      setTimeout(()=>{
        localStorage.removeItem(STORAGE_KEY);
        setData([]);
        showT("Day closed. Import your Excel file tomorrow to resume.");
      },1500);
    }catch(e){
      showT("Export failed - data not cleared: "+e.message,"#dc2626");
    }
  };
  const clearToday=()=>{
    const today=tday();
    const todayCount=data.filter(r=>r.date===today).length;
    if(todayCount===0){showT("No records from today to clear","#64748b");return;}
    if(confirm("Remove "+todayCount+" records added today ("+fmt(today)+")? This cannot be undone.")){
      setData(prev=>prev.filter(r=>r.date!==today));
      showT("Cleared "+todayCount+" records from today");
    }
  };
  const tabs=[{id:"live",label:"Live",count:live.length,warn:true},{id:"reinstate",label:"Reinstatements",count:reinstate.length,warn:reinstate.length>0},{id:"today",label:"Today",count:todayR.length},{id:"all",label:"All Records",count:data.length}];
  const savedStr=lastSaved?"Saved "+lastSaved.getHours().toString().padStart(2,"0")+":"+lastSaved.getMinutes().toString().padStart(2,"0"):"";

  return <div style={{fontFamily:"'Segoe UI',Arial,sans-serif",background:"#f0f2f5",minHeight:"100vh"}}>
    {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:9999,background:toast.c,color:"#fff",padding:"9px 18px",borderRadius:8,fontSize:12,fontWeight:600,boxShadow:"0 4px 16px rgba(0,0,0,0.2)"}}>{toast.msg}</div>}

    <div style={{background:"#0f2044",padding:"11px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div>
        <div style={{fontSize:9,color:"#8aabcf",letterSpacing:3,textTransform:"uppercase",marginBottom:1}}>Mason Wealth Management</div>
        <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>Correspondence Tracker</div>
        {savedStr&&<div style={{fontSize:9,color:"#4a9a6a",marginTop:1}}>{savedStr}</div>}
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        {[{l:"Live",v:live.length,c:"#f59e0b"},{l:"Reinstate",v:reinstate.length,c:"#ef4444"},{l:"Total",v:data.length,c:"#60a5fa"}].map((s,i)=>
          <div key={i} style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:s.c}}>{s.v}</div><div style={{fontSize:8,color:"#8aabcf",textTransform:"uppercase",letterSpacing:1}}>{s.l}</div></div>
        )}
        <div style={{width:1,height:30,background:"rgba(255,255,255,0.15)"}}/>
        <button onClick={()=>setShowBIS(true)} style={{background:"#7c3aed",color:"#fff",border:"none",padding:"7px 12px",borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:11}}>Paste BIS</button>
        <button onClick={()=>setShowPost(true)} style={{background:"#0369a1",color:"#fff",border:"none",padding:"7px 12px",borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:11}}>+ Post</button>
        <button onClick={handleExport} style={{background:"#16a34a",color:"#fff",border:"none",padding:"7px 12px",borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:11}}>Export Excel</button>
        <button onClick={endOfDay} style={{background:"#dc2626",color:"#fff",border:"none",padding:"7px 12px",borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:11}}>End of Day</button>
        <button onClick={()=>{setShowImp(true);setImpPrev(null);}} style={{background:"#c9a84c",color:"#0f2044",border:"none",padding:"7px 12px",borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:11}}>Import Excel</button>
      </div>
    </div>

    <div style={{background:"#1e3a5f",padding:"7px 16px",display:"flex",alignItems:"center",gap:18,overflowX:"auto"}}>
      <div style={{fontSize:9,color:"#8aabcf",textTransform:"uppercase",letterSpacing:2,fontWeight:700,whiteSpace:"nowrap"}}>Today's Briefing</div>
      {[{l:"Records today",v:todayR.length,c:"#93c5fd"},{l:"Live today",v:todayL.length,c:todayL.length>0?"#fbbf24":"#6ee7b7"},{l:"Reinstatements pending",v:reinstate.length,c:reinstate.length>0?"#fca5a5":"#6ee7b7"}].map((s,i)=>
        <div key={i} style={{display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
          <div style={{fontSize:16,fontWeight:800,color:s.c}}>{s.v}</div>
          <div style={{fontSize:10,color:"#8aabcf"}}>{s.l}</div>
          {i<2&&<div style={{width:1,height:16,background:"rgba(255,255,255,0.1)"}}/>}
        </div>
      )}
      {advWL.length>0&&<><div style={{width:1,height:16,background:"rgba(255,255,255,0.1)"}}/><div style={{fontSize:10,color:"#8aabcf",whiteSpace:"nowrap"}}>Outstanding:</div>{advWL.map(([adv,cnt])=><div key={adv} style={{display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}><span style={{background:"#f59e0b",color:"#0f2044",borderRadius:10,padding:"0 6px",fontSize:10,fontWeight:700}}>{cnt}</span><span style={{fontSize:10,color:"#cbd5e1"}}>{adv}</span></div>)}</>}
    </div>

    <div style={{display:"flex",height:"calc(100vh - 94px)"}}>
      <div style={{width:190,background:"#fff",borderRight:"1px solid #e2e8f0",padding:"10px 9px",overflowY:"auto",flexShrink:0}}>
        <div style={{display:"flex",flexDirection:"column",gap:2,marginBottom:12}}>
          {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 9px",fontSize:11,fontWeight:600,borderRadius:6,border:"none",cursor:"pointer",textAlign:"left",background:tab===t.id?"#0f2044":"transparent",color:tab===t.id?"#fff":"#475569"}}>
            <span>{t.label}</span><span style={{background:tab===t.id?"rgba(255,255,255,0.2)":(t.warn&&t.count>0?"#fef3c7":"#f1f5f9"),color:tab===t.id?"#fff":(t.warn&&t.count>0?"#92400e":"#94a3b8"),borderRadius:10,padding:"0 6px",fontSize:10,fontWeight:700}}>{t.count}</span>
          </button>)}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search client, policy..." style={{width:"100%",boxSizing:"border-box",padding:"6px 8px",fontSize:11,border:"1px solid #e2e8f0",borderRadius:5,marginBottom:8,outline:"none",color:"#1e293b"}}/>
        {[["Date",fDate,setFDate,dates.map(d=>[d,d==="All"?"All Dates":fmt(d)])],["Company",fCo,setFCo,cos.map(c=>[c,c])],["Adviser",fAdv,setFAdv,advs.map(a=>[a,a])],["Source",fSrc,setFSrc,[["All","All"],["BIS","BIS"],["Post","Post"]]],["Status",fStat,setFStat,[["All","All"],["Complete","Complete"],["Live","Live"]]]].map(([label,val,setter,opts])=>
          <div key={label} style={{marginBottom:7}}><div style={{fontSize:10,color:"#64748b",marginBottom:2,fontWeight:600}}>{label}</div><select value={val} onChange={e=>setter(e.target.value)} style={{width:"100%",padding:"5px 6px",fontSize:11,border:"1px solid #e2e8f0",borderRadius:5,color:"#1e293b",background:"#fff",outline:"none"}}>{opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>
        )}
        <button onClick={clear} style={{width:"100%",padding:"5px",fontSize:11,fontWeight:600,borderRadius:5,border:"1px solid #e2e8f0",cursor:"pointer",background:"#f8fafc",color:"#64748b",marginBottom:8}}>Clear Filters</button>
        <button onClick={clearToday} style={{width:"100%",padding:"5px",fontSize:10,borderRadius:5,border:"1px solid #fecaca",cursor:"pointer",background:"#fff",color:"#ef4444",marginBottom:12}}>Clear today's records</button>
        <div style={{fontSize:9,color:"#94a3b8",textTransform:"uppercase",letterSpacing:2,marginBottom:6,fontWeight:700}}>By Company</div>
        {byCo.map(([co,st])=><div key={co} onClick={()=>setFCo(co)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 6px",borderRadius:4,marginBottom:1,cursor:"pointer",fontSize:10,background:fCo===co?"#eff6ff":"transparent",color:fCo===co?"#1d4ed8":"#475569"}}><span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:6,height:6,borderRadius:"50%",flexShrink:0,background:CC[co]||"#888"}}/><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:100}}>{co}</span></span><span style={{display:"flex",gap:3}}>{st.l>0&&<span style={{background:"#fef3c7",color:"#92400e",borderRadius:8,padding:"0 4px",fontWeight:700,fontSize:9}}>{st.l}</span>}<span style={{color:"#94a3b8"}}>{st.t}</span></span></div>)}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
        {tab==="reinstate"&&<div style={{background:"#fff",borderRadius:8,border:"1px solid #fde68a",marginBottom:10,overflow:"hidden"}}>
          <div style={{background:"#fffbeb",padding:"8px 14px",borderBottom:"1px solid #fde68a",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,fontWeight:700,color:"#92400e"}}>Reinstatement Follow-ups</span><span style={{fontSize:11,color:"#a16207"}}>Check on the 17th of each month</span></div>
          {reinstate.length===0?<div style={{padding:16,textAlign:"center",color:"#94a3b8",fontSize:12}}>None outstanding</div>:reinstate.map(rec=><div key={rec.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",borderBottom:"1px solid #fef3c7"}}>
            <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:"#1e293b"}}>{rec.client}</div><div style={{fontSize:10,color:"#64748b"}}>{rec.company} {rec.policy} {fmt(rec.date)}</div><div style={{fontSize:10,color:"#92400e",marginTop:2}}>{fl(rec.content)}</div></div>
            <div style={{display:"flex",gap:6}}><button onClick={()=>openRec(rec)} style={{padding:"4px 10px",fontSize:11,fontWeight:600,borderRadius:5,border:"1px solid #e2e8f0",cursor:"pointer",background:"#fff",color:"#475569"}}>View</button><button onClick={()=>markDone(rec.id)} style={{padding:"4px 10px",fontSize:11,fontWeight:600,borderRadius:5,border:"none",cursor:"pointer",background:"#16a34a",color:"#fff"}}>Done</button></div>
          </div>)}
        </div>}
        <div style={{fontSize:12,color:"#64748b",marginBottom:8}}>Showing <strong style={{color:"#0f2044"}}>{filtered.length}</strong> records{tab==="live"&&<span style={{color:"#d97706",fontWeight:700}}> Action required</span>}{tab==="today"&&<span style={{color:"#2563eb",fontWeight:700}}> Today</span>}</div>
        <div style={{background:"#fff",borderRadius:8,border:"1px solid #e2e8f0",overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"80px 32px 120px 80px 120px 1fr 62px 1fr",background:"#f8fafc",borderBottom:"2px solid #e2e8f0",padding:"6px 10px",gap:6}}>
            {["Date","Src","Company","Adviser","Client","Content","Status","Action / Notes"].map(h=><div key={h} style={{fontSize:9,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1}}>{h}</div>)}
          </div>
          <div style={{maxHeight:"calc(100vh - 255px)",overflowY:"auto"}}>
            {filtered.length===0&&<div style={{padding:30,textAlign:"center",color:"#94a3b8"}}>No records match</div>}
            {filtered.map((rec,i)=>{
              const showSep=tab==="live"&&(i===0||filtered[i-1].date!==rec.date);
              const isEd=inEd&&inEd.id===rec.id;
              return <React.Fragment key={rec.id}>
                {showSep&&<div style={{background:"#1e3a5f",padding:"5px 10px",borderTop:"2px solid #0f2044",borderBottom:"2px solid #0f2044",display:"flex",gap:10}}>
                  <span style={{fontSize:10,fontWeight:700,color:"#93c5fd"}}>{fmt(rec.date)}</span>
                  <span style={{fontSize:10,color:"#8aabcf"}}>{filtered.filter(r=>r.date===rec.date).length} live items</span>
                </div>}
                <div onClick={()=>openRec(rec)} style={{display:"grid",gridTemplateColumns:"80px 32px 120px 80px 120px 1fr 62px 1fr",padding:"7px 10px",gap:6,borderBottom:"1px solid #f1f5f9",cursor:"pointer",background:rec.status==="Live"?"#fffbeb":i%2===0?"#fff":"#fafafa",alignItems:"center"}}>
                  <div style={{fontSize:10,color:"#475569"}}>{fmt(rec.date)}</div>
                  <div><span style={{fontSize:9,fontWeight:700,padding:"2px 4px",borderRadius:3,background:rec.source==="Post"?"#e0f2fe":"#f0fdf4",color:rec.source==="Post"?"#0369a1":"#166634"}}>{rec.source}</span></div>
                  <div style={{fontSize:10,fontWeight:600,color:CC[rec.company]||"#1e293b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rec.company}</div>
                  <div style={{fontSize:10,color:"#475569",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rec.adviser||"-"}</div>
                  <div style={{fontSize:10,fontWeight:500,color:"#1e293b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4}}>
                    {rec.incomplete&&<span style={{background:"#f59e0b",color:"#fff",borderRadius:3,padding:"0 4px",fontSize:8,fontWeight:700,flexShrink:0}}>!</span>}
                    {rec.client}
                  </div>
                  <div style={{fontSize:10,color:"#64748b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fl(rec.content)}</div>
                  <div><span style={{fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:8,background:rec.status==="Live"?"#fef3c7":"#dcfce7",color:rec.status==="Live"?"#92400e":"#166634"}}>{rec.status}</span></div>
                  <div onClick={e=>e.stopPropagation()}>
                    {isEd?<div style={{display:"flex",gap:3}}><input value={inVal} onChange={e=>setInVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveIn();if(e.key==="Escape")setInEd(null);}} autoFocus style={{flex:1,fontSize:10,padding:"2px 5px",border:"1.5px solid #3b82f6",borderRadius:3,outline:"none",color:"#1e293b",minWidth:0}}/><button onMouseDown={saveIn} style={{padding:"1px 5px",fontSize:10,fontWeight:700,borderRadius:3,border:"none",background:"#16a34a",color:"#fff",cursor:"pointer"}}>ok</button><button onMouseDown={()=>setInEd(null)} style={{padding:"1px 5px",fontSize:10,borderRadius:3,border:"none",background:"#f1f5f9",color:"#64748b",cursor:"pointer"}}>x</button></div>
                    :<div onClick={e=>startIn(rec,"action",e)} style={{fontSize:10,color:rec.action?"#334155":"#cbd5e1",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"2px 5px",cursor:"text",minHeight:18}}>{rec.action||<span style={{fontStyle:"italic"}}>Click to add note...</span>}</div>}
                  </div>
                </div>
              </React.Fragment>;
            })}
          </div>
        </div>
      </div>
    </div>

    {/* IMPORT EXCEL MODAL */}
    {showImp&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}} onClick={()=>{if(!impPrev)setShowImp(false);}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:12,padding:24,width:"100%",maxWidth:420,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        {!impPrev?<>
          <div style={{fontSize:16,fontWeight:700,color:"#0f2044",marginBottom:4}}>Import Excel File</div>
          <div style={{fontSize:12,color:"#64748b",marginBottom:14}}>Upload your daily tracker and hit Replace all.</div>
          <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0]);}} onClick={()=>fRef.current.click()} style={{border:"2px dashed "+(drag?"#0f2044":"#cbd5e1"),borderRadius:8,padding:"24px 16px",textAlign:"center",cursor:"pointer",marginBottom:12,background:drag?"#f0f7ff":"#f8fafc"}}>
            <div style={{fontSize:12,fontWeight:600,color:"#334155",marginBottom:2}}>{importing?"Reading file...":"Drop your .xlsx file here"}</div>
            <div style={{fontSize:11,color:"#94a3b8"}}>or click to browse</div>
            <input ref={fRef} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
          </div>
          <button onClick={()=>setShowImp(false)} style={{width:"100%",padding:"8px",fontWeight:600,fontSize:12,borderRadius:7,border:"1px solid #e2e8f0",cursor:"pointer",background:"#fff",color:"#64748b"}}>Cancel</button>
        </>:<>
          <div style={{fontSize:16,fontWeight:700,color:"#0f2044",marginBottom:12}}>Import Ready</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
            {[["Records in file",impPrev.all.length,"#0f2044"],["Live items",impPrev.all.filter(r=>r.status==="Live").length,"#d97706"],["Reinstatements",impPrev.all.filter(r=>r.status==="Live"&&(r.action.toLowerCase().includes("reinstate")||r.action.toLowerCase().includes("17th")||r.action.toLowerCase().includes("lapsed"))).length,"#ef4444"],["New records",impPrev.newOnly.length,"#16a34a"]].map(([label,val,color])=>
              <div key={label} style={{background:"#f8fafc",borderRadius:7,padding:"9px 11px"}}><div style={{fontSize:9,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>{label}</div><div style={{fontSize:18,fontWeight:800,color}}>{val}</div></div>
            )}
          </div>
          <button onClick={()=>confirmImp("replace")} style={{width:"100%",padding:"12px",fontWeight:700,fontSize:13,borderRadius:7,border:"none",cursor:"pointer",background:"#0f2044",color:"#fff",marginBottom:8}}>Replace all - load {impPrev.all.length} records</button>
          <button onClick={()=>setImpPrev(null)} style={{width:"100%",padding:"8px",fontWeight:600,fontSize:12,borderRadius:7,border:"1px solid #e2e8f0",cursor:"pointer",background:"#fff",color:"#64748b"}}>Back</button>
        </>}
      </div>
    </div>}

    {/* BIS PASTE MODAL */}
    {showBIS&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}} onClick={()=>{if(!bisPrev){setShowBIS(false);setBisText("");}}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:12,padding:24,width:"100%",maxWidth:bisPrev?"720px":"480px",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",maxHeight:"90vh",overflowY:"auto"}}>
        {!bisPrev?<>
          <div style={{fontSize:16,fontWeight:700,color:"#0f2044",marginBottom:4}}>Paste BIS Email</div>
          <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>Copy the full text from your BIS platform email and paste it below.</div>
          <textarea value={bisText} onChange={e=>setBisText(e.target.value)} rows={12} placeholder="Paste BIS email text here..." style={{width:"100%",boxSizing:"border-box",border:"1px solid #e2e8f0",borderRadius:7,padding:"10px",fontSize:12,resize:"vertical",outline:"none",color:"#1e293b",fontFamily:"inherit",marginBottom:12}}/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={parseBIS} style={{flex:1,padding:"10px",fontWeight:700,fontSize:13,borderRadius:7,border:"none",cursor:"pointer",background:"#7c3aed",color:"#fff"}}>Parse Records</button>
            <button onClick={()=>{setShowBIS(false);setBisText("");}} style={{flex:1,padding:"10px",fontWeight:600,fontSize:13,borderRadius:7,border:"1px solid #e2e8f0",cursor:"pointer",background:"#fff",color:"#64748b"}}>Cancel</button>
          </div>
        </>:<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontSize:16,fontWeight:700,color:"#0f2044"}}>Preview BIS Records</div>
            <div style={{display:"flex",gap:8,fontSize:11}}>
              <span style={{background:"#dcfce7",color:"#166634",padding:"2px 8px",borderRadius:10,fontWeight:700}}>{bisPrev.filter(r=>r.status==="Complete").length} Complete</span>
              <span style={{background:"#fef3c7",color:"#92400e",padding:"2px 8px",borderRadius:10,fontWeight:700}}>{bisPrev.filter(r=>r.status==="Live").length} Live</span>
              {bisPrev.filter(r=>r.incomplete).length>0&&<span style={{background:"#fef3c7",color:"#92400e",padding:"2px 8px",borderRadius:10,fontWeight:700}}>{bisPrev.filter(r=>r.incomplete).length} need name fix</span>}
            </div>
          </div>
          <div style={{fontSize:11,color:"#64748b",marginBottom:10}}>Review and edit before adding to tracker. Orange ! = incomplete name.</div>
          <div style={{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden",marginBottom:12}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 90px 100px 90px 70px",background:"#f8fafc",padding:"6px 10px",gap:6,borderBottom:"1px solid #e2e8f0"}}>
              {["Client","Company","Policy","Adviser","Status"].map(h=><div key={h} style={{fontSize:9,fontWeight:700,color:"#94a3b8",textTransform:"uppercase"}}>{h}</div>)}
            </div>
            <div style={{maxHeight:380,overflowY:"auto"}}>
              {bisPrev.map(rec=><div key={rec.id} style={{display:"grid",gridTemplateColumns:"1fr 90px 100px 90px 70px",padding:"7px 10px",gap:6,borderBottom:"1px solid #f1f5f9",background:rec.incomplete?"#fffbeb":"#fff",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  {rec.incomplete&&<span style={{background:"#f59e0b",color:"#fff",borderRadius:3,padding:"0 4px",fontSize:9,fontWeight:700,flexShrink:0}}>!</span>}
                  <input value={rec.client} onChange={e=>updateBisRec(rec.id,"client",e.target.value)} style={{width:"100%",fontSize:11,border:"1px solid #e2e8f0",borderRadius:4,padding:"2px 6px",outline:"none",color:"#1e293b"}}/>
                </div>
                <div style={{fontSize:10,color:"#475569",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rec.company}</div>
                <div style={{fontSize:10,color:"#475569"}}>{rec.policy}</div>
                <select value={rec.adviser} onChange={e=>updateBisRec(rec.id,"adviser",e.target.value)} style={{fontSize:10,border:"1px solid #e2e8f0",borderRadius:4,padding:"2px",outline:"none",color:"#1e293b",background:"#fff"}}>
                  <option value="">-- Adviser</option>
                  {ADVISERS.map(a=><option key={a} value={a}>{a}</option>)}
                </select>
                <div style={{display:"flex",gap:3}}>
                  {["Complete","Live"].map(s=><button key={s} onClick={()=>updateBisRec(rec.id,"status",s)} style={{flex:1,padding:"2px 4px",fontSize:9,fontWeight:600,borderRadius:4,border:"1.5px solid",borderColor:rec.status===s?(s==="Live"?"#f59e0b":"#16a34a"):"#e2e8f0",background:rec.status===s?(s==="Live"?"#fef3c7":"#dcfce7"):"#fff",color:rec.status===s?(s==="Live"?"#92400e":"#166534"):"#94a3b8",cursor:"pointer"}}>{s==="Complete"?"C":"L"}</button>)}
                </div>
              </div>)}
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={confirmBIS} style={{flex:1,padding:"10px",fontWeight:700,fontSize:13,borderRadius:7,border:"none",cursor:"pointer",background:"#0f2044",color:"#fff"}}>Add {bisPrev.length} records to tracker</button>
            <button onClick={()=>setBisPrev(null)} style={{padding:"10px 14px",fontWeight:600,fontSize:13,borderRadius:7,border:"1px solid #e2e8f0",cursor:"pointer",background:"#fff",color:"#64748b"}}>Back</button>
          </div>
        </>}
      </div>
    </div>}

    {/* ADD POST MODAL */}
    {showPost&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}} onClick={()=>setShowPost(false)}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:12,padding:24,width:"100%",maxWidth:440,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{fontSize:16,fontWeight:700,color:"#0f2044",marginBottom:14}}>Add Post Item</div>
        {[["Client Name","client","text",true],["Company","company","text",true],["Policy Number","policy","text",false],["Content / Change","content","textarea",false],["Action Taken","action","text",false]].map(([label,field,type,required])=>
          <div key={field} style={{marginBottom:10}}>
            <label style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:3,fontWeight:700}}>{label}{required&&<span style={{color:"#ef4444"}}> *</span>}</label>
            {type==="textarea"
              ?<textarea value={postForm[field]} onChange={e=>setPostForm({...postForm,[field]:e.target.value})} rows={2} style={{width:"100%",boxSizing:"border-box",border:"1px solid #e2e8f0",borderRadius:6,padding:"7px 9px",fontSize:12,resize:"vertical",outline:"none",color:"#1e293b",fontFamily:"inherit"}}/>
              :<input value={postForm[field]} onChange={e=>setPostForm({...postForm,[field]:e.target.value})} style={{width:"100%",boxSizing:"border-box",border:"1px solid #e2e8f0",borderRadius:6,padding:"7px 9px",fontSize:12,outline:"none",color:"#1e293b"}}/>
            }
          </div>
        )}
        <div style={{marginBottom:10}}>
          <label style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:3,fontWeight:700}}>Adviser</label>
          <select value={postForm.adviser} onChange={e=>setPostForm({...postForm,adviser:e.target.value})} style={{width:"100%",padding:"7px 9px",fontSize:12,border:"1px solid #e2e8f0",borderRadius:6,color:"#1e293b",background:"#fff",outline:"none"}}>
            <option value="">-- Select Adviser</option>
            {ADVISERS.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:3,fontWeight:700}}>Status</label>
          <div style={{display:"flex",gap:6}}>
            {["Complete","Live"].map(s=><button key={s} onClick={()=>setPostForm({...postForm,status:s})} style={{flex:1,padding:"7px",fontSize:12,fontWeight:600,borderRadius:6,border:"2px solid",borderColor:postForm.status===s?(s==="Live"?"#f59e0b":"#16a34a"):"#e2e8f0",background:postForm.status===s?(s==="Live"?"#fef3c7":"#dcfce7"):"#fff",color:postForm.status===s?(s==="Live"?"#92400e":"#166534"):"#94a3b8",cursor:"pointer"}}>{s}</button>)}
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={submitPost} style={{flex:1,padding:"10px",fontWeight:700,fontSize:13,borderRadius:7,border:"none",cursor:"pointer",background:"#0369a1",color:"#fff"}}>Add Record</button>
          <button onClick={()=>setShowPost(false)} style={{flex:1,padding:"10px",fontWeight:600,fontSize:13,borderRadius:7,border:"1px solid #e2e8f0",cursor:"pointer",background:"#fff",color:"#64748b"}}>Cancel</button>
        </div>
      </div>
    </div>}

    {/* RECORD DETAIL MODAL */}
    {sel&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}} onClick={()=>setSel(null)}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:10,padding:"22px",width:"100%",maxWidth:500,boxShadow:"0 20px 60px rgba(0,0,0,0.3)",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div><div style={{fontSize:15,fontWeight:700,color:"#0f2044",marginBottom:2}}>{sel.client}</div><div style={{fontSize:11,color:"#64748b"}}>Policy: <strong>{sel.policy}</strong> {sel.company} {fmt(sel.date)}</div></div>
          <span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:8,flexShrink:0,background:sel.status==="Live"?"#fef3c7":"#dcfce7",color:sel.status==="Live"?"#92400e":"#166534"}}>{sel.status}</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div style={{background:"#f8fafc",borderRadius:7,padding:"8px 10px"}}><div style={{fontSize:9,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>Source</div><div style={{fontSize:12,fontWeight:600,color:"#1e293b"}}>{sel.source}</div></div>
          <div style={{background:"#f8fafc",borderRadius:7,padding:"8px 10px"}}>
            <div style={{fontSize:9,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Adviser</div>
            <select value={eAdv} onChange={e=>setEAdv(e.target.value)} style={{width:"100%",fontSize:12,border:"1px solid #e2e8f0",borderRadius:5,padding:"3px 6px",outline:"none",color:"#1e293b",background:"#fff",fontWeight:600}}>
              <option value="">-- Unassigned</option>
              {ADVISERS.map(a=><option key={a} value={a}>{a}</option>)}
            </select>
          </div>
        </div>
        <div style={{background:"#f8fafc",borderRadius:7,padding:"10px",marginBottom:10}}>
          <div style={{fontSize:9,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Policy Change</div>
          <div style={{fontSize:11,color:"#334155",lineHeight:1.7,whiteSpace:"pre-line"}}>{sel.content}</div>
        </div>
        <div style={{marginBottom:9}}>
          <label style={{fontSize:9,color:"#64748b",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:4,fontWeight:700}}>Status</label>
          <div style={{display:"flex",gap:6}}>
            {["Complete","Live"].map(s=><button key={s} onClick={()=>setEStat(s)} style={{flex:1,padding:"7px",fontSize:12,fontWeight:600,borderRadius:6,border:"2px solid",borderColor:eStat===s?(s==="Live"?"#f59e0b":"#16a34a"):"#e2e8f0",background:eStat===s?(s==="Live"?"#fef3c7":"#dcfce7"):"#fff",color:eStat===s?(s==="Live"?"#92400e":"#166534"):"#94a3b8",cursor:"pointer"}}>{s}</button>)}
          </div>
        </div>
        <div style={{marginBottom:9}}>
          <label style={{fontSize:9,color:"#64748b",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:4,fontWeight:700}}>Action Taken</label>
          <textarea value={eAct} onChange={e=>setEAct(e.target.value)} rows={2} placeholder="Add action taken..." style={{width:"100%",boxSizing:"border-box",border:"1px solid #e2e8f0",borderRadius:7,padding:"8px 10px",fontSize:12,resize:"vertical",outline:"none",color:"#1e293b",fontFamily:"inherit"}}/>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{fontSize:9,color:"#64748b",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:4,fontWeight:700}}>Notes</label>
          <textarea value={eNote} onChange={e=>setENote(e.target.value)} rows={2} placeholder="Add any additional notes..." style={{width:"100%",boxSizing:"border-box",border:"1px solid #e2e8f0",borderRadius:7,padding:"8px 10px",fontSize:12,resize:"vertical",outline:"none",color:"#1e293b",fontFamily:"inherit"}}/>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={saveRec} style={{flex:1,padding:"10px",fontWeight:700,fontSize:13,borderRadius:7,border:"none",cursor:"pointer",background:"#0f2044",color:"#fff"}}>Save Changes</button>
          <button onClick={()=>setSel(null)} style={{flex:1,padding:"10px",fontWeight:600,fontSize:13,borderRadius:7,border:"1px solid #e2e8f0",cursor:"pointer",background:"#fff",color:"#64748b"}}>Cancel</button>
        </div>
      </div>
    </div>}
  </div>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
